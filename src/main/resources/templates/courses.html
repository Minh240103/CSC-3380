<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout('Course Catalog', ~{::main-content})}">
<body>
<div th:fragment="main-content">

    <div class="card search-bar-card">
        <form th:action="@{/courses}" method="get" class="search-form">
            <input type="text" name="q" class="search-input"
                   placeholder="Search by course ID or name..."
                   th:value="${searchQuery}"/>
            <select name="type" class="filter-select">
                <option value="">All types</option>
                <option value="CS_CORE" th:selected="${filterType == 'CS_CORE'}">CS Core</option>
                <option value="MATH" th:selected="${filterType == 'MATH'}">Math</option>
                <option value="ELECTIVE" th:selected="${filterType == 'ELECTIVE'}">Electives</option>
                <option value="GENERAL_ED" th:selected="${filterType == 'GENERAL_ED'}">General Ed</option>
            </select>
            <select name="semester" class="filter-select">
                <option value="">Any semester</option>
                <option value="FALL" th:selected="${filterSemester == 'FALL'}">Fall only</option>
                <option value="SPRING" th:selected="${filterSemester == 'SPRING'}">Spring only</option>
                <option value="BOTH" th:selected="${filterSemester == 'BOTH'}">Both semesters</option>
            </select>
            <label class="checkbox-label">
                <input type="checkbox" name="eligibleOnly" value="true"
                       th:checked="${eligibleOnly}"/>
                Eligible only
            </label>
            <button type="submit" class="btn-primary">Search</button>
            <a th:href="@{/courses}" class="btn-clear">Clear</a>
        </form>
    </div>

    <div class="results-meta">
        Showing <strong th:text="${courses.size()}">0</strong> courses
        <span th:if="${searchQuery != null and searchQuery != ''}">
            for "<span th:text="${searchQuery}"></span>"
        </span>
    </div>

    <div class="card">
        <table class="data-table">
            <thead>
                <tr>
                    <th>Course</th>
                    <th>Title</th>
                    <th>Credits</th>
                    <th>Semester</th>
                    <th>Prerequisites</th>
                    <th>Status</th>
                    <th></th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="course : ${courses}"
                    th:classappend="${!course.eligible} ? 'row--muted' : ''">
                    <td>
                        <span class="course-id-badge"
                              th:classappend="${course.type == 'CS_CORE'} ? 'badge--purple' :
                                             (${course.type == 'MATH'} ? 'badge--blue' :
                                             (${course.type == 'ELECTIVE'} ? 'badge--teal' : 'badge--gray'))"
                              th:text="${course.courseId}">CSC 4330</span>
                    </td>
                    <td>
                        <div class="course-title-cell">
                            <span th:text="${course.courseName}">Course Name</span>
                            <span th:if="${course.required}" class="tag tag--required" style="margin-left:6px;">Required</span>
                        </div>
                    </td>
                    <td th:text="${course.creditHours}">3</td>
                    <td>
                        <span class="semester-tag"
                              th:classappend="${course.semesterOffered == 'FALL'} ? 'sem--fall' :
                                             (${course.semesterOffered == 'SPRING'} ? 'sem--spring' : 'sem--both')"
                              th:text="${course.semesterOffered}">BOTH</span>
                    </td>
                    <td>
                        <span th:if="${#lists.isEmpty(course.prerequisites)}"
                              class="text-muted">None</span>
                        <span th:each="prereq, iter : ${course.prerequisites}">
                            <span th:text="${prereq}">CSC 3102</span>
                            <span th:if="${!iter.last}">, </span>
                        </span>
                    </td>
                    <td>
                        <span th:if="${course.eligible}"
                              class="status-chip status-chip--eligible">Eligible</span>
                        <span th:unless="${course.eligible}"
                              class="status-chip status-chip--ineligible"
                              th:title="'Missing: ' + ${course.missingPrereq}">Ineligible</span>
                    </td>
                    <td>
                        <a th:if="${course.eligible}"
                           th:href="@{/courses/{id}(id=${course.courseId})}"
                           class="btn-sm">View →</a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(courses)}">
                    <td colspan="7" class="empty-table-row">
                        No courses found matching your filters.
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

</div>
</body>
</html>
